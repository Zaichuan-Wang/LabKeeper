name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Backend syntax check
        run: python -m compileall -q backend tests

      - name: Unit tests
        env:
          LABKEEPER_ENV: test
          LABKEEPER_ENABLE_DEV_TOOLS: "1"
        run: python -m pytest tests/ -v --tb=short -x

      - name: Frontend syntax check
        run: |
          if command -v node &>/dev/null; then
            for file in frontend/*.js; do
              node --check "$file"
            done
          else
            echo "Node.js not available, skipping frontend check"
          fi
