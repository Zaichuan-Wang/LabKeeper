name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Backend syntax check
        run: python -m py_compile backend/server.py backend/registration.py backend/movements.py backend/validation_images.py 2>/dev/null || python -m py_compile backend/server.py backend/registration.py backend/movements.py

      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short -x

      - name: Frontend syntax check
        run: |
          if command -v node &>/dev/null; then
            node --check frontend/app.js
          else
            echo "Node.js not available, skipping frontend check"
          fi
